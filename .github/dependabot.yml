version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        labels:
          - "dependencies"
          - "dependabot"
          - "npm"
          - "deps:minor-patch"
      major:
        update-types:
          - "major"
        labels:
          - "dependencies"
          - "dependabot"
          - "npm"
          - "deps:major"
